name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils
          
          if [ ! -d "$THEOS" ]; then
            git clone --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          if [ ! -f "$THEOS/bin/dm.pl" ]; then
            curl -L https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl -o "$THEOS/bin/dm.pl"
            chmod +x "$THEOS/bin/dm.pl"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          ls -R
          make clean
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: packages/*.deb
