name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        run: |
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils lzma build-essential fakeroot dpkg
          
          if [ ! -d "$GITHUB_WORKSPACE/theos" ]; then
            git clone --recursive --depth 1 https://github.com/theos/theos "$GITHUB_WORKSPACE/theos"
          fi
          
          if [ ! -d "$GITHUB_WORKSPACE/theos/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$GITHUB_WORKSPACE/theos/sdks"
          fi

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          cd iOS-Simple-IGG-Mod-Menu-main
          # Force make to use the local THEOS path
          make THEOS=$THEOS package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: iOS-Simple-IGG-Mod-Menu-main/packages/*.deb
