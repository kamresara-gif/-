name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          # تحديد المسار محلياً داخل مشروعك لتجنب أي تضارب
          export THEOS=$GITHUB_WORKSPACE/theos
          
          # تثبيت الأدوات الضرورية
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils
          
          # تحميل Theos فقط إذا لم يكن موجوداً
          if [ ! -d "$THEOS" ]; then
            git clone --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          
          # تحميل SDKs فقط إذا لم تكن موجودة
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          # تحميل dm.pl
          if [ ! -f "$THEOS/bin/dm.pl" ]; then
            curl -L https://raw.githubusercontent.com/theos/theos/master/bin/dm.pl -o "$THEOS/bin/dm.pl"
            chmod +x "$THEOS/bin/dm.pl"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # تأكد هنا أن اسم المجلد المذكور يطابق اسم المجلد الذي يحتوي على الـ Makefile لديك
          # إذا كان الملف في المجلد الرئيسي مباشرة، احذف سطر الـ cd
          cd iOS-Simple-IGG-Mod-Menu-main
          make clean
          make package FINALPACKAGE=1

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: iOS-Simple-IGG-Mod-Menu-main/packages/*.deb
