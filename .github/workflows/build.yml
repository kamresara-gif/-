
name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils lzma build-essential fakeroot dpkg
          
          if [ ! -d "$THEOS" ]; then
            git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          
          # Find the directory containing the Makefile
          MAKEFILE_PATH=$(find . -name "Makefile" -not -path "*/.*" -print -quit)
          
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "Error: No Makefile found."
            exit 1
          fi
          
          MAKEFILE_DIR=$(dirname "$MAKEFILE_PATH")
          echo "Building in: $MAKEFILE_DIR"
          cd "$MAKEFILE_DIR"
          
          # Run build
          make clean || true
          make package FINALPACKAGE=1
          
          # Prepare output
          mkdir -p $GITHUB_WORKSPACE/output
          find . -name "*.deb" -exec cp {} $GITHUB_WORKSPACE/output/ \;

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: output/*.deb
