name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Environment
        run: |
          # Define Theos path
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils lzma build-essential fakeroot dpkg
          
          # Clone Theos
          git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          
          # Force clone SDKs into the correct directory
          mkdir -p "$THEOS/sdks"
          git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          cd iOS-Simple-IGG-Mod-Menu-main
          # Explicitly set SDK path and run make
          make SDK_PATH=$THEOS/sdks package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: iOS-Simple-IGG-Mod-Menu-main/packages/*.deb
