name: Tweak Cloud Compiler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          sudo apt-get update
          sudo apt-get install -y clang make git perl debianutils lzma build-essential fakeroot dpkg
          
          if [ ! -d "$THEOS" ]; then
            git clone --recursive --depth 1 https://github.com/theos/theos "$THEOS"
          fi
          
          if [ ! -d "$THEOS/sdks" ]; then
            git clone --depth 1 https://github.com/theos/sdks.git "$THEOS/sdks"
          fi
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH=$PATH:$THEOS/bin
          # Attempt to build, printing all output to debug
          if [ -f "Makefile" ]; then
            make
          else
            echo "No Makefile found!"
            exit 1
          fi
          # Create output directory
          mkdir -p output
          # Look for any .deb file in the current directory and subdirectories
          find . -name "*.deb" -exec cp {} output/ \;
          echo "Files in output directory:"
          ls -R output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tweak-package
          path: output/
